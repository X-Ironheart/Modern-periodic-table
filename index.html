<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Periodic Table</title>
  <link rel="shortcut icon" href="./data/Modern Periodic Table LOGO.png" type="image/x-icon" />
  <link rel="stylesheet" href="./css/table.css">
  <link rel="stylesheet" href="./css/explain.css">
</head>

<body>
  <div class="table-wrapper">
    <main id="main">
      <div class="explain">
        <h2>Categories Guide</h2>
        <div class="alkali-explain">
          <div class="color"></div>
          <div>alkali metal</div>
        </div>
        <div class="alkaline-earth-explain">
          <div class="color"></div>
          <div>alkaline earth metal</div>
        </div>
        <div class="metalloid-explain">
          <div class="color"></div>
          <div>metalloid</div>
        </div>
        <div class="noble-gas-explain">
          <div class="color"></div>
          <div>noble gas</div>
        </div>
        <div class="diatomic-nonmetal-explain">
          <div class="color"></div>
          <div>diatomic nonmetal</div>
        </div>
        <div class="transition-metal-explain">
          <div class="color"></div>
          <div>transition metal</div>
        </div>
        <div class="post-transition-metal-explain">
          <div class="color"></div>
          <div>post-transition metal</div>
        </div>
        <div class="polyatomic-nonmetal-explain">
          <div class="color"></div>
          <div>polyatomic nonmetal</div>
        </div>
        <div class="lanthanide-explain">
          <div class="color"></div>
          <div>lanthanide</div>
        </div>
        <div class="actinide-explain">
          <div class="color"></div>
          <div>actinide</div>
        </div>
      </div>
    </main>
  </div>

  <script src="./JS/main.js" type="module"></script>
</body>

</html>
